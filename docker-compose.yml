# Local infra for AEIOS (optional in Phase 0 — kernel runs without these).
# Requires Docker Desktop / Docker Engine.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aeios
      POSTGRES_PASSWORD: aeios
      POSTGRES_DB: aeios
    ports:
      - "5432:5432"
    volumes:
      - aeios_pg:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - aeios_qdrant:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - aeios_minio:/data

volumes:
  aeios_pg:
  aeios_qdrant:
  aeios_minio:
